        h2 = Usado para Subtitulo.
        h3 = Texto normal
        Obs: Os outros H's não são utilizados normalmente
    -->

    <h2>Aula HTML</h2>
    <h3>Aula HTML</h3>
    <h4>Aula HTML</h4>
    <h5>Aula HTML</h5>
    <h6>Aula HTML</h6>

    <!--Paragrafo: Auto Explicativo
        Lorem, Lorem20, ... = Usado para criar texto aleatórios, apenas para saber como o texto vai se comportar
    -->
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Atque, quibusdam? Eveniet consequatur dolorem aliquam est, hic dignissimos cum architecto distinctio?</p>
