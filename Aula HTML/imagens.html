<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>

  <body>
    <!-- Imagem = tag img
        src: Endereço da imagem;
        title: Título caso não seja possível carregar;
        alt: Texto alternativo;
        width: Largura da imagem (Esse é melhor modificar no CSS, não no HTML);
        height: Altura da imagem (Esse é melhor modificar no CSS, não no HTML);
    -->
    <img
      src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/025.png"
      alt="Pokemon rato amarelo de raio."
      title="Pikachu"
      width="200px"
      height="200px"
    />
  </body>
</html>
