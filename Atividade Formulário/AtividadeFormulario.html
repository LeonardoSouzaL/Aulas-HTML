<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atividade Formulário</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 40px;
      }
      h1 {
        text-align: center;
      }
      button {
        background-color: #4885ef;
        color: aliceblue;
      }
      legend {
        text-align: center;
      }
      input {
        margin-right: 15px;
      }
    </style>
  </head>
  <body>
    <h1>Formulário</h1>
    <form action="receber_dados.html" method="POST">
      <fieldset>
        <legend>CADASTRE SEUS DADOS</legend>
        <label for="nome">Nome Completo *</label>
        <input
          type="text"
          placeholder="Digite seu nome"
          name="nome"
          id="nome"
          required
        />

        <label for="sexo">Sexo</label>
        <select name="" id="sexo">
          <option value="">Selecione Sexo</option>
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
        </select>
        <br />
        <br />

        <label for="cpf">CPF *</label>
        <input
          type="text"
          placeholder="Digite seu CPF"
          name="cpf"
          id="cpf"
          required
        />

        <label for="rg">RG</label>
        <input type="text" placeholder="Digite seu RG" name="rg" id="rg" />

        <label for="nascimeno">Nascimento:</label>
        <input
          type="date"
          name="nascimeno"
          id="nascimeno"
          min="1900-01-01"
          max="2020-12-31"
        />
        <br />
        <br />

        <label for="ddd_tel">DDD *</label>
        <input
          type="text"
          placeholder="(11)"
          name="ddd_tel"
          id="ddd_tel"
          required
        />

        <label for="telefone">Telefone *</label>
        <input
          type="text"
          placeholder="Digite seu telefone"
          name="telefone"
          id="telefone"
          required
        />

        <label for="ddd_cell">DDD </label>
        <input type="text" placeholder="(11)" name="ddd_cell" id="ddd_cell" />

        <label for="celular">Celular </label>
        <input
          type="text"
          placeholder="Digite seu celular"
          name="celular"
          id="celular"
        />
        <br />
        <br />

        <label for="email">e-mail *</label>
        <input
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
          required
        />

        <label for="senha">Senha</label>
        <input type="text" id="senha" placeholder="Digite sua senha" />

        <label for="confirmar_senha">Confirmar</label>
        <input
          type="text"
          id="confirmar_senha"
          placeholder="Confirme sua Senha"
        />
        <br />
        <br />

        <label for="cep">CEP *</label>
        <input type="text" id="cep" placeholder="Digite seu CEP" required />

        <label for="endereco">Endereço *</label>
        <input
          type="text"
          id="endereco"
          placeholder="Digite seu endereço"
          required
        />

        <label for="numero_resi">Numero*</label>
        <input type="text" id="numero_resi" placeholder="140" required />
        <br />
        <br />

        <label for="bairro">Bairro *</label>
        <input
          type="text"
          id="bairro"
          name="bairro"
          placeholder="Digite seu bairro"
          required
        />

        <label for="complemento">Complemento</label>
        <input
          type="text"
          name="complemento"
          id="complemento"
          placeholder="Bloco C"
        />

        <label for="cidade">Cidade *</label>
        <input
          type="text"
          name="cidade"
          id="cidade"
          placeholder="Coloque sua cidade"
          required
        />

        <label for="estado">Estado*</label>
        <select name="" id="estado">
          <option value="">Selecione</option>
          <option value="SP">SP</option>
          <option value="MG">MG</option>
          <option value="AC">AC</option>
          <option value="DF">DF</option>
        </select>
        <br />
        <br />

        <button type="submit">Salvar</button>
      </fieldset>
    </form>
  </body>
</html>
